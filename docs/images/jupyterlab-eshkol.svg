<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Eshkol kernel running in JupyterLab</title>
  <desc id="desc">A stylized JupyterLab notebook showing Eshkol cells and their outputs.</desc>
  <rect width="1280" height="760" fill="#f5f6f8"/>
