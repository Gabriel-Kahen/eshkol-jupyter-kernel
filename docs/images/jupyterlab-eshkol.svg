  <text x="320" y="202" fill="#5b6675" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Stateful Eshkol code executed through a standard Jupyter kernel.</text>
  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
    <rect x="320" y="238" width="856" height="82" rx="6" fill="#f7f9fb" stroke="#d5dbe3"/>
