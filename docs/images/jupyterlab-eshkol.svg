  <text x="44" y="172" fill="#5b6675" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">src/eshkol_kernel</text>
  <text x="44" y="204" fill="#5b6675" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">tests</text>
  <rect x="280" y="78" width="956" height="640" rx="8" fill="#ffffff" stroke="#d5dbe3"/>
  <rect x="280" y="78" width="956" height="50" rx="8" fill="#fbfbfc"/>
  <rect x="280" y="120" width="956" height="1" fill="#d5dbe3"/>
  <text x="308" y="109" fill="#232b35" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="650">hello_eshkol.ipynb</text>
  <rect x="1048" y="91" width="160" height="24" rx="12" fill="#e8f2ec"/>
