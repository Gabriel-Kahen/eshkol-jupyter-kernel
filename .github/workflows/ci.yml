name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test,dev]'

      - name: Lint
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Run tests
        run: pytest -q

      - name: Run doctor with fake REPL
        run: |
          eshkol-kernel-doctor \
            --eshkol-repl "$(python -c 'import sys; print(sys.executable)')" \
            --repl-arg tests/fake_eshkol_repl.py \
            --skip-kernelspec

  real-eshkol:
    name: Real Eshkol smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Eshkol runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg wget
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/apt.llvm.org.gpg
          codename="$(. /etc/os-release && echo "$VERSION_CODENAME")"
          echo "deb [signed-by=/etc/apt/keyrings/apt.llvm.org.gpg] https://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y libblas3 liblapack3 libllvm21

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test,dev]'

      - name: Download Eshkol runtime
        run: eshkol-kernel-fetch-runtime --output .external/eshkol

      - name: Run real runtime smoke tests
        run: ESHKOL_REAL_REPL="$PWD/.external/eshkol/bin/eshkol-repl" pytest -q tests/test_real_eshkol.py

      - name: Run doctor with real Eshkol
        run: |
          eshkol-kernel-doctor \
            --eshkol-repl "$PWD/.external/eshkol/bin/eshkol-repl" \
            --skip-kernelspec
